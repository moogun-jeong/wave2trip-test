<body id="top">
    <a class="skip-link" href="#main-content">본문 바로가기</a>
    <header class="site-header">
        <div class="container header-inner">
            <div class="brand">
                <span class="brand-mark">W</span>
                <p class="brand-name">Wave2trip</p>
            </div>
            <nav class="site-nav">
                <ul>
                    <li><a href="index.html">홈</a></li>
                    <li><a href="index.html#destinations">여행지</a></li>
                    <li><a href="index.html#about">소개</a></li>
                    <li><a href="contact.html">문의</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <button id="theme-toggle" class="theme-toggle" aria-pressed="false" aria-label="다크 모드 전환">
                    <span class="theme-toggle-label">라이트</span>
                </button>
            </div>
        </div>
    </header>

    <main id="main-content">
        <section class="contact-hero">
            <div class="container contact-hero-inner">
                <div class="contact-copy">
                    <p class="eyebrow">파트너십 & 제휴</p>
                    <h1>함께 더 멀리, 더 깊이</h1>
                    <p class="hero-subtitle">Wave2trip과 함께 브랜드 협업, 여행 상품 공동 개발, 로컬 파트너십을 시작해보세요.</p>
                    <div class="contact-highlights">
                        <div class="highlight">
                            <span class="highlight-title">제휴 분야</span>
                            <span class="highlight-body">호텔, 항공, 체험, 로컬 커뮤니티</span>
                        </div>
                        <div class="highlight">
                            <span class="highlight-title">응답 시간</span>
                            <span class="highlight-body">영업일 기준 2일 이내</span>
                        </div>
                    </div>
                </div>
                <div class="contact-card">
                    <h3>제휴 문의</h3>
                    <p class="card-subtitle">아래 내용을 작성해 주시면 담당자가 빠르게 연락드립니다.</p>
                    <form class="contact-form" action="https://formspree.io/f/mnjbllwz" method="POST">
                        <label>
                            회사/브랜드명
                            <input type="text" name="company" placeholder="회사 또는 브랜드명을 입력하세요" required>
                        </label>
                        <label>
                            담당자 이름
                            <input type="text" name="name" placeholder="담당자 이름" required>
                        </label>
                        <label>
                            이메일
                            <input type="email" name="email" placeholder="name@example.com" required>
                        </label>
                        <label>
                            문의 유형
                            <select name="type" required>
                                <option value="">선택해 주세요</option>
                                <option value="brand">브랜드 협업</option>
                                <option value="product">여행 상품 공동 개발</option>
                                <option value="local">로컬 파트너십</option>
                                <option value="etc">기타</option>
                            </select>
                        </label>
                        <label>
                            문의 내용
                            <textarea name="message" rows="5" placeholder="간단한 제휴 제안과 목표를 알려주세요." required></textarea>
                        </label>
                        <button class="btn-primary" type="submit">문의 보내기</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>&copy; 2024 Wave2trip. All rights reserved.</p>
            <p class="footer-note">풍경을 더 사랑하는 여행자를 위해 만들었습니다.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
